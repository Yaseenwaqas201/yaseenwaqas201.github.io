<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Game Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === Global Styles === */
        :root {
            --bg-color: #0d0e12;
            --card-bg: #1a1c23;
            --text-color: #ffffff;
            --accent: #ff4757;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* === Header / Studio Info === */
        .studio-header {
            text-align: center;
            padding: 80px 20px 40px;
            background: radial-gradient(circle at top, #262a35 0%, #0d0e12 70%);
        }

        .studio-icon {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .studio-title {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, #a8a8b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === Games Grid Layout === */
        .games-portfolio {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        /* === Individual Game Card === */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* The wrapper holding the icon and title to scale them together */
        .game-content {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        .game-icon {
            width: 150px;
            height: 150px;
            border-radius: 35px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
        }

        /* === Hover Effects === */
        .game-card:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            background-color: #21242d;
            border-color: rgba(255,255,255,0.1);
        }

        /* Scale and move icon/title up */
        .game-card:hover .game-content {
            transform: scale(1.1) translateY(-25px);
        }

        /* === Dynamic Store Buttons === */
        .store-buttons {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0 15px;
        }

        /* Fade in and move buttons up on hover */
        .game-card:hover .store-buttons {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-apple { background-color: #111; border: 1px solid #333; }
        .btn-apple:hover { background-color: #222; }

        .btn-google { background-color: #111; border: 1px solid #333; }
        .btn-google:hover { background-color: #222; }

        .btn-amazon { background-color: #232f3e; border: 1px solid #FF9900; color: #FF9900; }
        .btn-amazon:hover { background-color: #37475a; }

    </style>
</head>
<body>

    <header class="studio-header">
        <img src="studioicon.png" alt="Alpha Game Studio Icon" class="studio-icon">
        <h1 class="studio-title">Alpha Game Studio</h1>
    </header>

    <main class="games-portfolio">
        <div class="games-grid">

            <div class="game-card">
                <div class="game-content">
                    <img src="rushcooking.png" alt="Rush Cooking" class="game-icon">
                    <h2 class="game-title">Rush Cooking: Chef Madness Game</h2>
                </div>
                <div class="store-buttons">
                    <a href="#" class="btn btn-apple"><i class="fa-brands fa-apple"></i> App Store</a>
                    <a href="#" class="btn btn-google"><i class="fa-brands fa-google-play"></i> Play Store</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-content">
                    <img src="hiddenObject.png" alt="Hidden Object" class="game-icon">
                    <h2 class="game-title">Hidden Object: Find It Game</h2>
                </div>
                <div class="store-buttons">
                    <a href="#" class="btn btn-apple"><i class="fa-brands fa-apple"></i> App Store</a>
                    <a href="#" class="btn btn-google"><i class="fa-brands fa-google-play"></i> Play Store</a>
                    <a href="#" class="btn btn-amazon"><i class="fa-brands fa-amazon"></i> Amazon</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-content">
                    <img src="fashion.png" alt="Fashion DressUp" class="game-icon">
                    <h2 class="game-title">Fashion Makeover: Makeup Games</h2>
                </div>
                <div class="store-buttons">
                    <a href="#" class="btn btn-google"><i class="fa-brands fa-google-play"></i> Play Store</a>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
