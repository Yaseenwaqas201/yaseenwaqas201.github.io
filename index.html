<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Game Studio</title>
    <style>
        /* === Global Styles === */
        :root {
            --bg-color: #0d0e12;
            --card-bg: #1a1c23;
            --text-color: #ffffff;
            --accent: #ff4757;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* === Header / Studio Info === */
        .studio-header {
            text-align: center;
            padding: 70px 20px 30px;
            background: radial-gradient(circle at top, #262a35 0%, #0d0e12 70%);
        }

        .studio-icon {
            width: 150px; 
            height: 150px;
            border-radius: 35px;
            object-fit: contain; 
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            margin-bottom: 15px;
            background-color: transparent;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .studio-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.3);
        }

        .studio-title {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            
            /* Juicy Animated Gradient Setup */
            background: linear-gradient(90deg, #ffffff 0%, #ff4757 33%, #ff7eb3 66%, #ffffff 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* The Flow Animation */
            animation: juiceFlow 4s linear infinite;
            filter: drop-shadow(0 4px 10px rgba(255, 71, 87, 0.3));
        }

        @keyframes juiceFlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* === Games Grid Layout === */
        .games-portfolio {
            padding: 30px 5%;
            max-width: 1100px; /* Scaled down width */
            margin: 0 auto;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Scaled down column size */
            gap: 25px; /* Reduced gap between cards */
        }

        /* === Individual Game Card === */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            
            /* Flex layout allows content to dynamically balance itself */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 380px; /* Reduced card height */
            /* Borders removed */
        }

        .game-content {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-icon {
            width: 130px; /* Reduced icon size */
            height: 130px;
            border-radius: 30px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.3rem; /* Reduced font size slightly */
            margin: 0;
            font-weight: 700;
        }

        /* === Hover Effects === */
        .game-card:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            background-color: #21242d;
        }

        .game-card:hover .game-content {
            transform: scale(1.05); /* Scales up, pushed up naturally by buttons below */
        }

        /* Expands the button area automatically based on how many buttons exist */
        .game-card:hover .download-buttons {
            max-height: 180px; 
            opacity: 1;
            margin-top: 15px; 
        }

        /* --- Universal Custom Buttons Style --- */
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px; 
            width: 85%;
            max-width: 220px; /* Sleeker buttons */
            
            /* Hidden state with auto-size transition */
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            margin-top: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 6px 12px; 
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: left; 
            flex-shrink: 0; /* Prevents buttons from squishing during animation */
        }

        .download-btn:active {
            transform: scale(0.96); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .download-btn img {
            width: 24px; 
            height: auto; 
            object-fit: contain;
        }

        /* Button Text Layout */
        .btn-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .small-text {
            font-size: 0.55rem; 
            font-weight: 600;
            opacity: 0.8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .large-text {
            font-size: 0.95rem; 
            font-weight: 700;
        }

        /* Play Store & Apple (Black Buttons) */
        .download-btn.play, .download-btn.apple { 
            background-color: #111;
