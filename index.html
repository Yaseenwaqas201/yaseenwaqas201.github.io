<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- SEO -->
<meta name="description" content="Play Fun casual games free and offline play .">

<!-- Mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alpha Game Studio</title>

<!-- Favicon -->
<link rel="icon" href="logo.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a1033, #0a0815);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 30px 10px;
    animation: fadeIn 1s ease;
}

.header img {
    width: 70px;
    border-radius: 20px;
    box-shadow: 0 0 20px #b57cff;
}

/* JUICY TITLE */
.header h1 {
    margin: 0;
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(45deg, #b57cff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, 150px);
    gap: 30px;
    justify-content: center;
    padding: 20px;
}

/* GAME CARD */
.game {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
}

.game:hover {
    transform: translateY(-5px);
}

.game img {
    width: 150px;
    border-radius: 20px;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(181,124,255,0.3);
}

.game:hover img {
    transform: scale(1.1);
    box-shadow: 0 0 25px #b57cff;
}

/* OVERLAY */
.overlay {
    position: absolute;
    top: 0;
    width: 150px;
    height: 150px;
    background: rgba(10, 5, 20, 0.9);
    border-radius: 20px;
    opacity: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
}

.game:hover .overlay {
    opacity: 1;
}

/* STORE BUTTONS */
.overlay a {
    background: linear-gradient(45deg, #7b2cff, #b57cff);
    padding: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-size: 12px;
    transition: 0.2s;
}

.overlay a:hover {
    background: #ffffff;
    color: #6a00ff;
    transform: scale(1.05);
}

/* ANIMATIONS */
@keyframes glow {
    from { text-shadow: 0 0 10px #b57cff; }
    to { text-shadow: 0 0 25px #ffffff; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="Alpha Game Studio Logo">
    <h1>Alpha Game Studio</h1>
</div>

<!-- GRID -->
<div class="grid" id="gameGrid"></div>

<script>
const games = [
  {
    id: "cooking",
    name: "Cooking Utopia",
    icon: "cooking.png",
    stores: [
      { name: "PlayStore", link: "https://play.google.com/" },
      { name: "Amazon", link: "https://www.amazon.com/" }
    ]
  },
  {
    id: "puzzle",
    name: "Puzzle Game",
    icon: "puzzle.png",
    stores: [
      { name: "PlayStore", link: "#" },
      { name: "App Store", link: "#" }
    ]
  }
];

const grid = document.getElementById("gameGrid");

games.forEach(game => {
    let storeButtons = game.stores.map(s =>
        `<a href="${s.link}" target="_blank" rel="noopener">${s.name}</a>`
    ).join("");

    grid.innerHTML += `
        <div class="game" onclick="openGame('${game.id}')">
            <img src="${game.icon}" alt="${game.name}">
            <div class="overlay">
                ${storeButtons}
            </div>
        </div>
    `;
});

function openGame(id) {
    window.location.href = "game.html?id=" + id;
}
</script>

</body>
</html>
